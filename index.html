<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>DompetDigital</title>
    <script src="webui.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #f5f7fa;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --line: #e5e7eb;
            --accent: #3b82f6;
            --accent-press: #2563eb;
            --in: #2f9e72;
            --out: #d66b6b;
            --shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
        }

        * { box-sizing: border-box; }

        body {
            font-family: "Inter", "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 14px;
            color: var(--text);
            background: var(--bg);
        }

        .container {
            max-width: 480px;
            margin: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .saldo-panel {
            background: linear-gradient(145deg, #eff6ff 0%, #f8fafc 100%);
            border: 1px solid #dbeafe;
            border-radius: 18px;
            padding: 18px;
            box-shadow: var(--shadow);
        }

        .saldo-panel p {
            margin: 0;
            color: var(--muted);
            font-size: 13px;
            font-weight: 500;
        }

        .saldo-panel h2 {
            font-size: 36px;
            line-height: 1.15;
            margin: 6px 0 0;
            letter-spacing: -0.3px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 14px;
            box-shadow: var(--shadow);
        }

        .card h3 {
            margin: 0 0 12px;
            font-size: 15px;
            color: var(--text);
            font-weight: 600;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .full { grid-column: 1 / -1; }
        .form-group { margin-bottom: 0; display: flex; flex-direction: column; gap: 6px; }

        .form-group label {
            font-size: 12px;
            color: var(--muted);
            font-weight: 600;
        }

        input, select, button {
            width: 100%;
            min-height: 46px;
            padding: 11px 12px;
            border: 1px solid var(--line);
            border-radius: 12px;
            background: #ffffff;
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        button {
            border: none;
            background: var(--accent);
            color: white;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 6px 12px rgba(59, 130, 246, 0.25);
            transition: background-color 0.15s ease, transform 0.15s ease;
        }

        button:hover {
            background: var(--accent-press);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(1px);
            background: var(--accent-press);
        }

        .chart-wrap { padding-top: 4px; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 4px;
            font-size: 13px;
        }

        th, td {
            border-bottom: 1px solid var(--line);
            padding: 10px 6px;
            text-align: left;
        }

        th {
            color: var(--muted);
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 0.1px;
        }

        tbody tr:hover { background: #f9fafb; }
        .masuk { color: var(--in); font-weight: 600; }
        .keluar { color: var(--out); font-weight: 600; }

        canvas { max-height: 250px; }

        @media (min-width: 640px) {
            body { padding: 24px; }
            .container { max-width: 820px; }
            .form-grid { grid-template-columns: 1fr 1fr; }
            .saldo-panel h2 { font-size: 42px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="saldo-panel">
        <p>Total Saldo Saat Ini:</p>
        <h2 id="totalSaldo">Rp 0</h2>
    </div>

    <div class="card">
        <h3>Catat Transaksi Baru</h3>
        <div class="form-grid">
            <div class="form-group full">
                <label for="keterangan">Deskripsi</label>
                <input type="text" id="keterangan" placeholder="Keterangan transaksi (mis: Makan siang)">
            </div>
            <div class="form-group">
                <label for="nominal">Nominal</label>
                <input type="text" id="nominal" placeholder="Nominal (mis: Rp50.000)" inputmode="numeric" oninput="formatNominalInput()">
            </div>
            <div class="form-group">
                <label for="jenis">Tipe</label>
                <select id="jenis" onchange="sinkronKategori()">
                    <option value="Pemasukan">Pemasukan</option>
                    <option value="Pengeluaran">Pengeluaran</option>
                </select>
            </div>
            <div class="form-group full">
                <label for="kategoriDetail">Kategori</label>
                <select id="kategoriDetail"></select>
            </div>
            <div class="form-group full">
                <button onclick="kirimData()">Simpan Data</button>
            </div>
        </div>
    </div>

    <div class="card chart-wrap">
        <h3>Ringkasan Kategori</h3>
        <canvas id="grafikKategori"></canvas>
    </div>

    <div class="card">
        <h3>Riwayat Transaksi</h3>
        <table id="tabelRiwayat">
            <thead>
                <tr>
                    <th>Keterangan</th>
                    <th>Jenis</th>
                    <th>Kategori</th>
                    <th>Nominal</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>
</div>

<script>
    let chartInstance = null;
    const kategoriByJenis = {
        Pemasukan: ['Gaji', 'Uang Bulanan', 'Bonus', 'Lainnya'],
        Pengeluaran: ['Makanan', 'Transportasi', 'Tagihan', 'Belanja', 'Lainnya']
    };

    function sinkronKategori() {
        const jenis = document.getElementById('jenis').value;
        const kategoriDetail = document.getElementById('kategoriDetail');
        kategoriDetail.innerHTML = '';
        kategoriByJenis[jenis].forEach((item) => {
            const option = document.createElement('option');
            option.value = item;
            option.innerText = item;
            kategoriDetail.appendChild(option);
        });
    }

    function parseNominal(value) {
        const angka = value.replace(/[^0-9]/g, '');
        return angka ? parseInt(angka, 10) : NaN;
    }

    function formatRupiah(angka) {
        return `Rp${angka.toLocaleString('id-ID')}`;
    }

    function formatNominalInput() {
        const nominalInput = document.getElementById('nominal');
        const nominal = parseNominal(nominalInput.value);
        nominalInput.value = Number.isNaN(nominal) ? '' : formatRupiah(nominal);
    }

    // Fungsi untuk mengirim data ke Backend (Python)
    function kirimData() {
        const keterangan = document.getElementById('keterangan').value.trim();
        const nominal = parseNominal(document.getElementById('nominal').value);
        const jenis = document.getElementById('jenis').value;
        const kategoriDetail = document.getElementById('kategoriDetail').value;
        
        if (!keterangan || Number.isNaN(nominal) || nominal <= 0) {
            alert('Harap isi keterangan dan nominal valid!');
            return;
        }

        // Bungkus data menjadi satu objek JSON string
        const dataKirim = JSON.stringify({
            keterangan: keterangan,
            nominal: nominal,
            jenis: jenis,
            kategori_detail: kategoriDetail
        });

        // Memanggil fungsi Python dengan 1 argumen (dataKirim)
        webui.simpan_transaksi(dataKirim).then(() => {
            // Kosongkan form setelah berhasil diinput
            document.getElementById('keterangan').value = '';
            document.getElementById('nominal').value = '';
            document.getElementById('keterangan').focus();
        });
    }

    // Fungsi ini akan dipanggil oleh Backend (Python) untuk memompa data terbaru
    function updateUI(payloadJSON) {
        const data = JSON.parse(payloadJSON);
        
        // Update Panel Saldo
        document.getElementById('totalSaldo').innerText = "Rp " + data.total_saldo.toLocaleString('id-ID');

        // Update Tabel Riwayat
        const tbody = document.querySelector('#tabelRiwayat tbody');
        tbody.innerHTML = '';
        data.riwayat.forEach(item => {
            const tr = document.createElement('tr');
            const colorClass = item.jenis === 'Pemasukan' ? 'masuk' : 'keluar';
            tr.innerHTML = `
                <td>${item.keterangan}</td>
                <td>${item.jenis}</td>
                <td>${item.kategori_detail}</td>
                <td class="${colorClass}">Rp ${parseInt(item.nominal).toLocaleString('id-ID')}</td>
            `;
            tbody.appendChild(tr);
        });

        // Update Chart.js (Doughnut Chart)
        const ctx = document.getElementById('grafikKategori').getContext('2d');
        if (chartInstance) { chartInstance.destroy(); }

        const labels = Object.keys(data.agregasi);
        const values = Object.values(data.agregasi);
        const colors = ['#93c5fd', '#86efac', '#fca5a5', '#c4b5fd', '#a7f3d0', '#bfdbfe', '#fecaca'];
        
        chartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: values,
                    backgroundColor: labels.map((_, index) => colors[index % colors.length]),
                    borderColor: '#fffdfd',
                    borderWidth: 3,
                    hoverOffset: 8
                }]
            },
            options: {
                cutout: '62%',
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: {
                            usePointStyle: true,
                            pointStyle: 'circle',
                            padding: 12,
                            color: '#6b7280',
                            boxWidth: 8,
                            boxHeight: 8,
                            font: { size: 11 }
                        }
                    }
                }
            }
        });
    }

    sinkronKategori();
</script>
</body>
</html>
