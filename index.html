<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DompetDigital</title>
    <script src="webui.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Import Font Lembut & Modern -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Dark Mode Palette (Tailwind-inspired) */
            --bg-main: #0f172a;       /* Slate 900 */
            --card-bg: #1e293b;       /* Slate 800 */
            --card-border: #334155;   /* Slate 700 */
            --text-main: #f8fafc;     /* Slate 50 */
            --text-muted: #94a3b8;    /* Slate 400 */
            --accent: #6366f1;        /* Indigo 500 */
            --accent-hover: #4f46e5;  /* Indigo 600 */
            --accent-glow: rgba(99, 102, 241, 0.4);
            --income: #10b981;        /* Emerald 500 */
            --expense: #ef4444;       /* Red 500 */
            --input-bg: #0b1120;      /* Darker slate for inputs */
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 20px 14px;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 500px;
            margin: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Saldo Panel - Premium Gradient Look */
        .saldo-panel {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 28px 24px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* Dekorasi Glow di Saldo Panel */
        .saldo-panel::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: var(--accent);
            filter: blur(80px);
            opacity: 0.3;
            border-radius: 50%;
        }

        .saldo-panel p {
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
            position: relative;
            z-index: 1;
        }

        .saldo-panel h2 {
            font-size: 40px;
            font-weight: 700;
            margin-top: 8px;
            letter-spacing: -1px;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            z-index: 1;
        }

        /* Card Umum */
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .card h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card h3::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 16px;
            background-color: var(--accent);
            border-radius: 4px;
        }

        /* Form Styling */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
        }

        .full { grid-column: 1 / -1; }
        
        .form-group { 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
        }

        .form-group label {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 600;
        }

        input, select {
            width: 100%;
            min-height: 50px;
            padding: 0 16px;
            border: 1px solid var(--card-border);
            border-radius: 14px;
            background-color: var(--input-bg);
            color: var(--text-main);
            font-family: inherit;
            font-size: 15px;
            transition: all 0.2s ease;
        }

        input::placeholder { color: #475569; }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        /* Styling spesifik untuk dropdown biar dark mode nya rapi */
        select option {
            background-color: var(--card-bg);
            color: var(--text-main);
        }

        /* Button Modern */
        button {
            width: 100%;
            min-height: 52px;
            margin-top: 4px;
            border: none;
            border-radius: 14px;
            background-color: var(--accent);
            color: white;
            font-family: inherit;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--accent-glow);
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--accent-glow);
        }

        button:active {
            transform: translateY(1px);
        }

        /* Tabel Transaksi */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 14px;
        }

        th, td {
            padding: 14px 10px;
            text-align: left;
            border-bottom: 1px solid var(--card-border);
        }

        th {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--card-border);
        }

        tbody tr {
            transition: background-color 0.2s ease;
        }

        tbody tr:hover { 
            background-color: rgba(255, 255, 255, 0.03); 
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .masuk { color: var(--income); font-weight: 600; }
        .keluar { color: var(--expense); font-weight: 600; }

        /* Chart Area */
        .chart-wrap { padding-top: 20px; }
        canvas { max-height: 260px; margin: auto; }

        /* Responsive Desktop/Tablet */
        @media (min-width: 640px) {
            body { padding: 40px 20px; }
            .container { max-width: 860px; }
            .form-grid { grid-template-columns: 1fr 1fr; gap: 18px; }
            .saldo-panel { padding: 40px; }
            .saldo-panel h2 { font-size: 48px; }
            
            /* Desktop Layout Grid */
            .main-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 20px;
            }
            .full-width { grid-column: 1 / -1; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="saldo-panel">
        <p>Total Saldo Saat Ini</p>
        <h2 id="totalSaldo">Rp 0</h2>
    </div>

    <!-- Wrapper grid untuk desktop -->
    <div class="main-grid">
        <div class="card">
            <h3>Catat Transaksi</h3>
            <div class="form-grid">
                <div class="form-group full">
                    <label for="keterangan">Deskripsi</label>
                    <input type="text" id="keterangan" placeholder="Mis: Beli kopi...">
                </div>
                <div class="form-group">
                    <label for="nominal">Nominal</label>
                    <input type="text" id="nominal" placeholder="Rp 0" inputmode="numeric" oninput="formatNominalInput()">
                </div>
                <div class="form-group">
                    <label for="jenis">Tipe</label>
                    <select id="jenis" onchange="sinkronKategori()">
                        <option value="Pemasukan">Pemasukan</option>
                        <option value="Pengeluaran">Pengeluaran</option>
                    </select>
                </div>
                <div class="form-group full">
                    <label for="kategoriDetail">Kategori</label>
                    <select id="kategoriDetail"></select>
                </div>
                <div class="form-group full">
                    <button onclick="kirimData()">Simpan Data</button>
                </div>
            </div>
        </div>

        <div class="card chart-wrap">
            <h3>Analisis Kategori</h3>
            <canvas id="grafikKategori"></canvas>
        </div>

        <div class="card full-width">
            <h3>Riwayat Transaksi</h3>
            <div class="table-container">
                <table id="tabelRiwayat">
                    <thead>
                        <tr>
                            <th>Keterangan</th>
                            <th>Jenis</th>
                            <th>Kategori</th>
                            <th>Nominal</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Data disuntik dari JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    let chartInstance = null;
    const kategoriByJenis = {
        Pemasukan: ['Gaji', 'Uang Bulanan', 'Bonus', 'Lainnya'],
        Pengeluaran: ['Makanan', 'Transportasi', 'Tagihan', 'Belanja', 'Lainnya']
    };

    function sinkronKategori() {
        const jenis = document.getElementById('jenis').value;
        const kategoriDetail = document.getElementById('kategoriDetail');
        kategoriDetail.innerHTML = '';
        kategoriByJenis[jenis].forEach((item) => {
            const option = document.createElement('option');
            option.value = item;
            option.innerText = item;
            kategoriDetail.appendChild(option);
        });
    }

    function parseNominal(value) {
        const angka = value.replace(/[^0-9]/g, '');
        return angka ? parseInt(angka, 10) : NaN;
    }

    function formatRupiah(angka) {
        return `Rp${angka.toLocaleString('id-ID')}`;
    }

    function formatNominalInput() {
        const nominalInput = document.getElementById('nominal');
        const nominal = parseNominal(nominalInput.value);
        nominalInput.value = Number.isNaN(nominal) ? '' : formatRupiah(nominal);
    }

    function kirimData() {
        const keterangan = document.getElementById('keterangan').value.trim();
        const nominal = parseNominal(document.getElementById('nominal').value);
        const jenis = document.getElementById('jenis').value;
        const kategoriDetail = document.getElementById('kategoriDetail').value;
        
        if (!keterangan || Number.isNaN(nominal) || nominal <= 0) {
            alert('Harap isi keterangan dan nominal valid!');
            return;
        }

        const dataKirim = JSON.stringify({
            keterangan: keterangan,
            nominal: nominal,
            jenis: jenis,
            kategori_detail: kategoriDetail
        });

        webui.simpan_transaksi(dataKirim).then(() => {
            document.getElementById('keterangan').value = '';
            document.getElementById('nominal').value = '';
            document.getElementById('keterangan').focus();
        });
    }

    function updateUI(payloadJSON) {
        const data = JSON.parse(payloadJSON);
        
        document.getElementById('totalSaldo').innerText = "Rp " + data.total_saldo.toLocaleString('id-ID');

        const tbody = document.querySelector('#tabelRiwayat tbody');
        tbody.innerHTML = '';
        data.riwayat.forEach(item => {
            const tr = document.createElement('tr');
            const colorClass = item.jenis === 'Pemasukan' ? 'masuk' : 'keluar';
            tr.innerHTML = `
                <td>${item.keterangan}</td>
                <td>${item.jenis}</td>
                <td>${item.kategori_detail}</td>
                <td class="${colorClass}">Rp ${parseInt(item.nominal).toLocaleString('id-ID')}</td>
            `;
            tbody.appendChild(tr);
        });

        const ctx = document.getElementById('grafikKategori').getContext('2d');
        if (chartInstance) { chartInstance.destroy(); }

        const labels = Object.keys(data.agregasi);
        const values = Object.values(data.agregasi);
        
        // Warna chart disesuaikan biar pop-up di dark mode (neon/vibrant colors)
        const colors = ['#818cf8', '#34d399', '#fb7185', '#a78bfa', '#2dd4bf', '#60a5fa', '#f87171'];
        
        chartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: values,
                    backgroundColor: labels.map((_, index) => colors[index % colors.length]),
                    borderColor: '#1e293b', // Samain dengan warna background card
                    borderWidth: 4,
                    hoverOffset: 8
                }]
            },
            options: {
                cutout: '65%',
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: {
                            usePointStyle: true,
                            pointStyle: 'circle',
                            padding: 16,
                            color: '#94a3b8', // Teks legend disesuaikan ke dark mode
                            font: { 
                                family: "'Plus Jakarta Sans', sans-serif",
                                size: 12,
                                weight: 500
                            }
                        }
                    }
                }
            }
        });
    }

    sinkronKategori();
</script>
</body>
</html>
